<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Game Over - Tetris Supervisor</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Theme Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface": "#e5e2e1",
                    "tertiary-container": "#e7e2d9",
                    "surface-container-highest": "#353535",
                    "on-primary-fixed": "#191c1e",
                    "background": "#131313",
                    "surface-variant": "#353535",
                    "error": "#ffb4ab",
                    "primary": "#ffffff",
                    "surface-dim": "#131313",
                    "on-background": "#e5e2e1",
                    "on-primary-container": "#626567",
                    "on-secondary-fixed": "#0d1c2f",
                    "secondary-fixed": "#d5e3fd",
                    "on-surface-variant": "#c4c7c9",
                    "secondary-container": "#3c4a5e",
                    "on-error": "#690005",
                    "tertiary-fixed-dim": "#cbc6bd",
                    "on-primary": "#2d3133",
                    "primary-container": "#e0e3e5",
                    "on-tertiary-fixed-variant": "#494640",
                    "surface": "#131313",
                    "surface-bright": "#3a3939",
                    "inverse-primary": "#5c5f61",
                    "outline": "#8e9193",
                    "on-primary-fixed-variant": "#444749",
                    "on-error-container": "#ffdad6",
                    "on-tertiary-fixed": "#1d1b16",
                    "outline-variant": "#444749",
                    "surface-container": "#201f1f",
                    "secondary-fixed-dim": "#b9c7e0",
                    "surface-container-high": "#2a2a2a",
                    "error-container": "#93000a",
                    "tertiary-fixed": "#e7e2d9",
                    "on-secondary": "#233144",
                    "secondary": "#b9c7e0",
                    "inverse-surface": "#e5e2e1",
                    "inverse-on-surface": "#313030",
                    "tertiary": "#ffffff",
                    "on-tertiary-container": "#67645d",
                    "surface-container-low": "#1c1b1b",
                    "primary-fixed-dim": "#c4c7c9",
                    "on-tertiary": "#32302a",
                    "surface-container-lowest": "#0e0e0e",
                    "primary-fixed": "#e0e3e5",
                    "on-secondary-fixed-variant": "#3a485c",
                    "on-secondary-container": "#abb9d2",
                    "surface-tint": "#c4c7c9"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "touch-target": "44px",
                    "stack-md": "16px",
                    "grid-cell": "32px",
                    "stack-sm": "8px",
                    "gutter": "16px",
                    "panel-padding": "24px"
            },
            "fontFamily": {
                    "display-lg": ["Geist"],
                    "status-label": ["Geist"],
                    "data-mono": ["Geist"],
                    "body-base": ["Geist"],
                    "headline-md": ["Geist"]
            },
            "fontSize": {
                    "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                    "status-label": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                    "data-mono": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                    "body-base": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                    "headline-md": ["24px", { "lineHeight": "1.2", "fontWeight": "600" }]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom grid background to simulate the game board underneath */
        .bg-playfield-grid {
            background-size: 32px 32px;
            background-image: 
                linear-gradient(to right, rgba(68, 71, 73, 0.2) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(68, 71, 73, 0.2) 1px, transparent 1px);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-base text-body-base h-screen w-screen overflow-hidden relative selection:bg-primary selection:text-on-primary">
<!-- Simulated Game Playfield Background (Level 0 Base) -->
<div class="absolute inset-0 flex justify-center items-center opacity-40 pointer-events-none">
<div class="w-[320px] h-[640px] border border-outline-variant/30 bg-playfield-grid relative shadow-[inset_0_0_100px_rgba(0,0,0,0.8)]">
<!-- Simulated locked pieces -->
<div class="absolute bottom-0 left-0 w-full h-32 bg-surface-container-high/50 border-t border-outline-variant/30 backdrop-blur-sm"></div>
<div class="absolute bottom-32 left-[64px] w-[64px] h-[32px] bg-outline-variant/20 border border-outline-variant/40"></div>
</div>
</div>
<!-- Game Over Overlay (Level 2 Overlays - Red Tinted & Blurred) -->
<div class="absolute inset-0 bg-error-container/20 backdrop-blur-[12px] z-50 flex items-center justify-center p-gutter">
<!-- Modal Container (Level 1 Panel styled for critical state) -->
<div class="w-full max-w-md bg-surface-container-lowest border border-error/50 rounded flex flex-col items-center relative overflow-hidden shadow-[0_0_60px_-15px_rgba(255,180,171,0.15)]">
<!-- Top Accent Line -->
<div class="h-1 w-full bg-error absolute top-0 left-0 shadow-[0_0_10px_rgba(255,180,171,0.8)]"></div>
<div class="p-panel-padding w-full flex flex-col items-center gap-stack-md mt-4">
<!-- Heading -->
<div class="flex flex-col items-center gap-2 mb-2">
<span class="material-symbols-outlined text-[32px] text-error drop-shadow-[0_0_8px_rgba(255,180,171,0.6)]">warning</span>
<h1 class="font-display-lg text-display-lg text-error uppercase tracking-tighter drop-shadow-[0_0_12px_rgba(255,180,171,0.4)] text-center">
                        Game Over
                    </h1>
</div>
<!-- Stats Bento Grid -->
<div class="w-full grid grid-cols-2 gap-[1px] bg-outline-variant/40 border border-outline-variant/40 rounded-sm overflow-hidden">
<!-- Final Score (Failure Context) -->
<div class="bg-surface-container flex flex-col items-center justify-center p-4 gap-1">
<span class="font-status-label text-status-label text-on-surface-variant uppercase">Final Score</span>
<span class="font-headline-md text-headline-md text-on-surface">38,450</span>
</div>
<!-- High Score (Success Contrast) -->
<div class="bg-primary/5 flex flex-col items-center justify-center p-4 gap-1 border border-primary relative">
<div class="absolute inset-0 bg-primary/[0.03] animate-pulse pointer-events-none"></div>
<div class="flex items-center gap-1 text-primary">
<span class="material-symbols-outlined text-[14px]">military_tech</span>
<span class="font-status-label text-status-label text-primary uppercase">New High Score</span>
</div>
<span class="font-headline-md text-headline-md text-primary drop-shadow-[0_0_8px_rgba(255,255,255,0.4)]">38,450</span>
</div>
<!-- Level -->
<div class="bg-surface-container flex flex-col items-center justify-center p-4 gap-1">
<span class="font-status-label text-status-label text-on-surface-variant uppercase">Level Reached</span>
<span class="font-data-mono text-data-mono text-on-surface">12</span>
</div>
<!-- Lines -->
<div class="bg-surface-container flex flex-col items-center justify-center p-4 gap-1">
<span class="font-status-label text-status-label text-on-surface-variant uppercase">Total Lines</span>
<span class="font-data-mono text-data-mono text-on-surface">114</span>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-stack-sm mt-4">
<!-- Primary Action -->
<button class="h-touch-target w-full bg-primary/10 border-2 border-primary text-primary font-data-mono text-data-mono uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-primary/20 hover:shadow-[0_0_15px_rgba(255,255,255,0.15)] transition-all focus:ring-2 focus:ring-primary focus:ring-offset-4 focus:ring-offset-surface-container-lowest outline-none rounded-DEFAULT">
<span class="material-symbols-outlined">replay</span>
                        Play Again
                    </button>
<!-- Secondary Action -->
<button class="h-touch-target w-full border border-outline-variant text-on-surface-variant font-data-mono text-data-mono uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-surface-variant/50 hover:text-on-surface transition-colors focus:ring-2 focus:ring-outline focus:ring-offset-4 focus:ring-offset-surface-container-lowest outline-none rounded-DEFAULT">
<span class="material-symbols-outlined">menu</span>
                        Main Menu
                    </button>
</div>
</div>
</div>
</div>
</body></html>
