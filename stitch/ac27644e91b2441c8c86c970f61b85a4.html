<style>
        .grid-bg {
            background-size: 32px 32px;
            background-image:
                linear-gradient(to right, rgba(51, 65, 85, 0.5) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(51, 65, 85, 0.5) 1px, transparent 1px);
        }
        .mini-grid-bg {
            background-size: 24px 24px;
            background-image:
                linear-gradient(to right, rgba(51, 65, 85, 0.3) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(51, 65, 85, 0.3) 1px, transparent 1px);
        }
        /* Tetromino Colors for visual interest, adhering to high contrast on dark bg */
        .t-cyan { background-color: #06b6d4; box-shadow: 0 0 10px #06b6d4; border: 1px solid #fff; }
        .t-blue { background-color: #3b82f6; box-shadow: 0 0 10px #3b82f6; border: 1px solid #fff; }
        .t-orange { background-color: #f97316; box-shadow: 0 0 10px #f97316; border: 1px solid #fff; }

        .t-green { background-color: #22c55e; box-shadow: 0 0 10px #22c55e; border: 1px solid #fff; }
        .t-purple { background-color: #a855f7; box-shadow: 0 0 10px #a855f7; border: 1px solid #fff; }

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-base overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-background dark:bg-background text-on-background dark:text-on-background docked full-width top-0 border-b border-outline-variant/50 flex justify-between items-center w-full px-gutter h-touch-target z-50">
<div class="flex items-center gap-4">
<span class="font-display-lg text-headline-md font-black tracking-tighter text-primary dark:text-primary leading-none">TETRIS SUPERVISOR</span>
</div>
<div class="flex items-center gap-2">
<button aria-label="settings" class="w-touch-target h-touch-target flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors duration-200 active:scale-95">
<span class="material-symbols-outlined">settings</span>
</button>
<button aria-label="help" class="w-touch-target h-touch-target flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors duration-200 active:scale-95">
<span class="material-symbols-outlined">help</span>
</button>
<button aria-label="pause" class="w-touch-target h-touch-target flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors duration-200 active:scale-95">

</button>
</div>
</header>
<div class="flex flex-1 overflow-hidden">

<div class="flex flex-col gap-2">

<span class="font-body-base text-body-base uppercase tracking-wider">Play</span>
</a>

<span class="font-body-base text-body-base">Leaderboard</span>
</a>

<span class="material-symbols-outlined">keyboard</span>
<span class="font-body-base text-body-base">Controls</span>
</a>
