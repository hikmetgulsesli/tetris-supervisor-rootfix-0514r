<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tetris Supervisor - Main Menu</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#e5e2e1",
                        "tertiary-container": "#e7e2d9",
                        "surface-container-highest": "#353535",
                        "on-primary-fixed": "#191c1e",
                        "background": "#131313",
                        "surface-variant": "#353535",
                        "error": "#ffb4ab",
                        "primary": "#ffffff",
                        "surface-dim": "#131313",
                        "on-background": "#e5e2e1",
                        "on-primary-container": "#626567",
                        "on-secondary-fixed": "#0d1c2f",
                        "secondary-fixed": "#d5e3fd",
                        "on-surface-variant": "#c4c7c9",
                        "secondary-container": "#3c4a5e",
                        "on-error": "#690005",
                        "tertiary-fixed-dim": "#cbc6bd",
                        "on-primary": "#2d3133",
                        "primary-container": "#e0e3e5",
                        "on-tertiary-fixed-variant": "#494640",
                        "surface": "#131313",
                        "surface-bright": "#3a3939",
                        "inverse-primary": "#5c5f61",
                        "outline": "#8e9193",
                        "on-primary-fixed-variant": "#444749",
                        "on-error-container": "#ffdad6",
                        "on-tertiary-fixed": "#1d1b16",
                        "outline-variant": "#444749",
                        "surface-container": "#201f1f",
                        "secondary-fixed-dim": "#b9c7e0",
                        "surface-container-high": "#2a2a2a",
                        "error-container": "#93000a",
                        "tertiary-fixed": "#e7e2d9",
                        "on-secondary": "#233144",
                        "secondary": "#b9c7e0",
                        "inverse-surface": "#e5e2e1",
                        "inverse-on-surface": "#313030",
                        "tertiary": "#ffffff",
                        "on-tertiary-container": "#67645d",
                        "surface-container-low": "#1c1b1b",
                        "primary-fixed-dim": "#c4c7c9",
                        "on-tertiary": "#32302a",
                        "surface-container-lowest": "#0e0e0e",
                        "primary-fixed": "#e0e3e5",
                        "on-secondary-fixed-variant": "#3a485c",
                        "on-secondary-container": "#abb9d2",
                        "surface-tint": "#c4c7c9"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "touch-target": "44px",
                        "stack-md": "16px",
                        "grid-cell": "32px",
                        "stack-sm": "8px",
                        "gutter": "16px",
                        "panel-padding": "24px"
                    },
                    "fontFamily": {
                        "display-lg": ["Geist"],
                        "status-label": ["Geist"],
                        "data-mono": ["Geist"],
                        "body-base": ["Geist"],
                        "headline-md": ["Geist"]
                    },
                    "fontSize": {
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "status-label": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "data-mono": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "body-base": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.2", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background h-screen w-full flex flex-col items-center justify-center relative overflow-hidden font-body-base">
<!-- Background Grid Pattern -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-20" style="background-image: linear-gradient(to right, #444749 1px, transparent 1px), linear-gradient(to bottom, #444749 1px, transparent 1px); background-size: 32px 32px;">
</div>
<!-- Central Vignette for depth -->
<div class="absolute inset-0 z-0 pointer-events-none bg-[radial-gradient(circle_at_center,transparent_0%,#131313_70%)]"></div>
<!-- Main Content Canvas -->
<div class="relative z-10 flex flex-col items-center w-full max-w-md px-gutter">
<!-- Minimalist Branding -->
<div class="mb-12 text-center">
<h1 class="font-display-lg text-display-lg font-black tracking-tighter text-primary">TETRIS SUPERVISOR</h1>
<p class="font-status-label text-status-label text-on-surface-variant mt-2">V.1.0.42-STABLE</p>
</div>
<!-- Action Buttons Layout -->
<div class="flex flex-col gap-stack-md w-full">
<!-- START GAME Button -->
<button class="group flex items-center justify-between w-full min-h-[44px] bg-surface-container border border-outline-variant px-panel-padding py-4 hover:bg-surface-variant hover:border-primary transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-4 focus:ring-offset-background">
<span class="font-headline-md text-headline-md text-primary group-hover:text-primary transition-colors">START GAME</span>
<span class="material-symbols-outlined text-primary" data-icon="play_arrow">play_arrow</span>
</button>
<!-- RESUME Button (Disabled State) -->
<button class="flex items-center justify-between w-full min-h-[44px] bg-surface-container/50 border border-outline-variant/30 px-panel-padding py-4 opacity-50 cursor-not-allowed" disabled="">
<span class="font-headline-md text-headline-md text-on-surface-variant">RESUME</span>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="pause">pause</span>
</button>
<!-- HOW TO PLAY Button -->
<button class="group flex items-center justify-between w-full min-h-[44px] bg-surface-container border border-outline-variant px-panel-padding py-4 hover:bg-surface-variant hover:border-primary transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-4 focus:ring-offset-background">
<span class="font-headline-md text-headline-md text-on-surface group-hover:text-primary transition-colors">HOW TO PLAY</span>
<span class="material-symbols-outlined text-on-surface group-hover:text-primary transition-colors" data-icon="help">help</span>
</button>
<!-- SETTINGS Button -->
<button class="group flex items-center justify-between w-full min-h-[44px] bg-surface-container border border-outline-variant px-panel-padding py-4 hover:bg-surface-variant hover:border-primary transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-4 focus:ring-offset-background">
<span class="font-headline-md text-headline-md text-on-surface group-hover:text-primary transition-colors">SETTINGS</span>
<span class="material-symbols-outlined text-on-surface group-hover:text-primary transition-colors" data-icon="settings">settings</span>
</button>
</div>
</div>
<!-- Minimalist Footer Anchor -->
<div class="absolute bottom-8 w-full flex justify-center z-10">
<p class="font-status-label text-status-label text-on-surface-variant opacity-60 uppercase tracking-widest">
            © 2024 GRID LOGIC SYSTEMS. ALL RIGHTS RESERVED.
        </p>
</div>
</body></html>
